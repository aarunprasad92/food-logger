<!DOCTYPE html>
<html>
<head>
  <title>Food Logger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* 🔥 DASHBOARD STYLES */
    .dashboard {
      margin-bottom: 20px;
    }

    .card {
      background: #f9fafc;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .metric {
      font-weight: 600;
      font-size: 14px;
    }

    .numbers {
      font-size: 13px;
      color: #666;
    }

    .bar {
      height: 8px;
      background: #eee;
      border-radius: 6px;
      margin-top: 6px;
    }

    .fill {
      height: 100%;
      background: #4CAF50;
      border-radius: 6px;
    }

    label {
      font-size: 14px;
      color: #666;
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin-top: 6px;
      margin-bottom: 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
      background: #fafafa;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #4CAF50;
      background: #fff;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #4CAF50, #2e7d32);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #status {
      margin-top: 15px;
      text-align: center;
      font-weight: 500;
    }

    .recent {
      margin-top: 20px;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 8px 12px;
      background: #eef3ff;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>🍽️ Food Logger</h2>

  <!-- 🔥 DASHBOARD -->
  <div id="dashboard" class="dashboard"></div>

  <label>Food</label>
  <input list="foodList" id="food" placeholder="Search food...">
  <datalist id="foodList"></datalist>

  <label>Meal</label>
  <select id="meal">
    <option>Breakfast</option>
    <option>Lunch</option>
    <option>Dinner</option>
    <option>Snack</option>
  </select>

  <label>Quantity (grams)</label>
  <input id="qty" type="number" placeholder="e.g. 100">

  <button onclick="logFood()">Log Food</button>

  <p id="status"></p>

  <div class="recent">
    <div class="chips">
      <div class="chip" onclick="quickAdd('Chicken breast')">Chicken</div>
      <div class="chip" onclick="quickAdd('Boiled white rice')">Rice</div>
      <div class="chip" onclick="quickAdd('Omelette')">Egg</div>
    </div>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwm-jKSxHerr7rNhbn2t-QLOn9ruxJWeW0h2DRd0GFklDbO7q2kIddq9ubTxsvXZ79t/exec";

// 🔥 Load dashboard
function loadDashboard() {
  fetch(API_URL + "?type=dashboard")
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("dashboard");
      container.innerHTML = "";

      data.forEach(item => {
        //const percent = Math.min(item.progress * 100, 100);
        const percent = item.progress * 100;
        const barWidth = Math.min(percent, 100);
        console.log(item.metric, percent);
        let color = 'green';
        if (percent < 90) color = 'orange';
        else if (percent > 105) color = 'red';

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <div class="metric">${item.metric}</div>
          <div class="numbers">${item.consumed} / ${item.target}</div>
          <div class="bar">
            <div class="fill" style="width:${barWidth}%; background:${color}"></div>
          </div>
        `;

        container.appendChild(div);
      });
    });
}

// Load food list + dashboard
window.onload = function() {

  loadDashboard(); // 🔥 NEW

  fetch(API_URL)
    .then(res => res.json())
    .then(foodList => {
      const datalist = document.getElementById("foodList");

      foodList.forEach(food => {
        const option = document.createElement("option");
        option.value = food;
        datalist.appendChild(option);
      });
    })
    .catch(() => {
      document.getElementById("status").innerText = "⚠️ Failed to load food list";
    });
};

// Quick add
function quickAdd(foodName) {
  document.getElementById("food").value = foodName;
}

// Log food
function logFood() {
  const food = document.getElementById("food").value;
  const meal = document.getElementById("meal").value;
  const quantity = document.getElementById("qty").value;

  if (!food || !quantity) {
    document.getElementById("status").innerText = "⚠️ Fill all fields";
    return;
  }

  document.getElementById("status").innerText = "Logging...";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      food: food,
      meal: meal,
      quantity: quantity
    })
  })
  .then(res => res.text())
  .then(() => {
    document.getElementById("status").innerText = "✅ Logged!";
    document.getElementById("qty").value = "";

    loadDashboard(); // 🔥 refresh after logging
  })
  .catch(() => {
    document.getElementById("status").innerText = "❌ Failed";
  });
}
</script>

</body>
</html>
