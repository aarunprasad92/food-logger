<!DOCTYPE html>
<html>
<head>
  <title>Food Logger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      color: #666;
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin-top: 6px;
      margin-bottom: 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
      background: #fafafa;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #4CAF50;
      background: #fff;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #4CAF50, #2e7d32);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.02);
    }

    #status {
      margin-top: 15px;
      text-align: center;
      font-weight: 500;
    }

    .recent {
      margin-top: 20px;
    }

    .recent-title {
      font-size: 14px;
      color: #777;
      margin-bottom: 8px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 8px 12px;
      background: #eef3ff;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }

    .chip:hover {
      background: #dbe6ff;
    }

  </style>
</head>

<body>

<div class="container">

  <h2>🍽️ Food Logger</h2>

  <label>Food</label>
  <input list="foodList" id="food" placeholder="Search food...">
  <datalist id="foodList"></datalist>

  <label>Meal</label>
  <select id="meal">
    <option>Breakfast</option>
    <option>Lunch</option>
    <option>Dinner</option>
    <option>Snack</option>
  </select>

  <label>Quantity (grams)</label>
  <input id="qty" type="number" placeholder="e.g. 100">

  <button onclick="logFood()">Log Food</button>

  <p id="status"></p>

  <!-- Recent -->
  <div class="recent">
    <div class="recent-title">Quick Add</div>
    <div class="chips">
      <div class="chip" onclick="quickAdd('Chicken breast')">Chicken</div>
      <div class="chip" onclick="quickAdd('Boiled white rice')">Rice</div>
      <div class="chip" onclick="quickAdd('Omelette')">Egg</div>
    </div>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwm-jKSxHerr7rNhbn2t-QLOn9ruxJWeW0h2DRd0GFklDbO7q2kIddq9ubTxsvXZ79t/exec";

// Load food list
window.onload = function() {
  fetch(API_URL)
    .then(res => res.json())
    .then(foodList => {
      const datalist = document.getElementById("foodList");

      foodList.forEach(food => {
        const option = document.createElement("option");
        option.value = food;
        datalist.appendChild(option);
      });
    })
    .catch(() => {
      document.getElementById("status").innerText = "⚠️ Failed to load food list";
    });
};

// Quick add
function quickAdd(foodName) {
  document.getElementById("food").value = foodName;
}

// Log food
function logFood() {
  const food = document.getElementById("food").value;
  const meal = document.getElementById("meal").value;
  const quantity = document.getElementById("qty").value;

  if (!food || !quantity) {
    document.getElementById("status").innerText = "⚠️ Fill all fields";
    return;
  }

  document.getElementById("status").innerText = "Logging...";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      food: food,
      meal: meal,
      quantity: quantity
    })
  })
  .then(res => res.text())
  .then(() => {
    document.getElementById("status").innerText = "✅ Logged!";
    document.getElementById("qty").value = "";
  })
  .catch(() => {
    document.getElementById("status").innerText = "❌ Failed";
  });
}
</script>

</body>
</html>
